plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def dartEnvironmentVariables = []
if (project.hasProperty('dart-defines')) {
    dartEnvironmentVariables = project.property('dart-defines')
            .split(',')
            .collectEntries { entry ->
                def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
                [(pair.first()): pair.last()]
            }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasReleaseSigning = keystorePropertiesFile.exists()
def hasDartEnvSigning = dartEnvironmentVariables.KEY_PASSWORD
def communityBuild = System.getenv("COMMUNITY_BUILD") == "true"
if (hasReleaseSigning) {
    println "Using keystorePropertiesFile"
    println keystorePropertiesFile
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
} else if (dartEnvironmentVariables.KEY_PASSWORD) {
    println "Using dart-defined variable as KEY_PASSWORD"
    keystoreProperties.setProperty('storeFile', '../../Keystore/upload-keystore.jks')
    keystoreProperties.setProperty('keyAlias', 'upload')
    keystoreProperties.setProperty('keyPassword', dartEnvironmentVariables.KEY_PASSWORD)
    keystoreProperties.setProperty('storePassword', dartEnvironmentVariables.KEY_PASSWORD)
} else {
    println "No key properties defined"
}

android {
    compileSdkVersion 35

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "de.seemoo.pairfi"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        if (hasReleaseSigning || hasDartEnvSigning) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning || hasDartEnvSigning) {
                println "Using official release signing configuration"
                signingConfig signingConfigs.release
            } else if (communityBuild) {
                println "Using debug signing for community release build"
                signingConfig signingConfigs.debug
            } else {
                throw new GradleException(
                    "Release signing is not configured. " +
                    "Provide android/key.properties or set COMMUNITY_BUILD=true."
                )
            }

            minifyEnabled true
            shrinkResources true
        }
    }
    namespace 'de.seemoo.pairfi'
}

flutter {
    source '../..'
}

dependencies {
    implementation("com.google.code.findbugs:jsr305:3.0.2")
    implementation 'com.android.support:multidex:2.0.1' //enter the latest multidex version
    implementation 'androidx.work:work-runtime-ktx:2.8.0-alpha03'
    implementation 'com.google.android.material:material:1.12.0'
}
