android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=false

# Use the Gradle daemon & parallel workers
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.workers.max=12

# Build cache + configuration cache (speeds up repeated builds)
#org.gradle.caching=true
#org.gradle.configuration-cache=true

# Give Gradle a healthy heap (adjust to your RAM)
org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8

# Kotlin incremental compilation
kotlin.incremental=true
kotlin.incremental.useClasspathSnapshot=true
kotlin.daemon.jvmargs=-Xmx2g
