name: Firmware build

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"

  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"

permissions:
  contents: read

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build firmware
        run: bash firmware/docker/build.sh

      - name: Verify firmware build
        run: |
          set -euo pipefail
          test -s firmware/out/pairfi-nexmon-magisk.zip
          echo "Firmware build completed successfully."
